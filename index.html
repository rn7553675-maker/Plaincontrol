<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 মিউজিক প্লেয়ার</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;600;800&family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a12;
    --card: #12121e;
    --card2: #1a1a2e;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --gold: #ffd54f;
    --text: #f0e6ff;
    --muted: #7b7b9a;
    --glow: rgba(224, 64, 251, 0.35);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 20%, rgba(124,77,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(224,64,251,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 95vw;
    padding: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: 'Baloo Da 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Now Playing Card */
  .now-playing {
    background: linear-gradient(145deg, var(--card2), #16163a);
    border-radius: 24px;
    padding: 28px 24px 22px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 40px var(--glow);
    position: relative;
    overflow: hidden;
  }
  .now-playing::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(224,64,251,0.15), transparent 70%);
    pointer-events: none;
  }

  /* Vinyl disc */
  .vinyl-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .vinyl {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #1a0033, #300060, #1a0033, #400070,
      #1a0033, #300060, #1a0033, #400070,
      #1a0033
    );
    position: relative;
    box-shadow: 0 0 30px rgba(224,64,251,0.4), 0 6px 24px rgba(0,0,0,0.6);
    transition: transform 0.3s;
  }
  .vinyl.spinning {
    animation: spin 3s linear infinite;
  }
  .vinyl::after {
    content: '';
    position: absolute;
    inset: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, #2a0050, #1a0033);
    border: 3px solid rgba(255,255,255,0.1);
  }
  .vinyl-center {
    position: absolute;
    inset: 55px;
    border-radius: 50%;
    background: var(--accent);
    z-index: 2;
    box-shadow: 0 0 10px var(--glow);
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .song-info {
    text-align: center;
    margin-bottom: 18px;
  }
  .song-title {
    font-family: 'Baloo Da 2', cursive;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-index {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 14px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: -4px;
    width: 13px; height: 13px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .progress-bar-bg:hover .progress-fill::after { opacity: 1; }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.2rem;
    padding: 8px;
    border-radius: 50%;
    transition: color 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { color: var(--text); transform: scale(1.12); }

  .play-btn {
    width: 58px; height: 58px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    color: white;
    font-size: 1.5rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 24px var(--glow), 0 4px 16px rgba(0,0,0,0.4);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 36px rgba(224,64,251,0.55), 0 4px 16px rgba(0,0,0,0.5);
  }
  .play-btn:active { transform: scale(0.96); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding: 0 4px;
  }
  .volume-icon { font-size: 0.95rem; color: var(--muted); }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--glow);
    cursor: pointer;
  }

  /* Playlist */
  .playlist-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .playlist {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .track {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 16px;
    background: var(--card);
    border-radius: 14px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .track:hover {
    background: var(--card2);
    border-color: rgba(224,64,251,0.2);
    transform: translateX(3px);
  }
  .track.active {
    background: linear-gradient(90deg, rgba(124,77,255,0.18), rgba(224,64,251,0.12));
    border-color: rgba(224,64,251,0.4);
  }
  .track.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    border-radius: 3px 0 0 3px;
  }

  .track-num {
    font-size: 0.75rem;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .track.active .track-num { color: var(--accent); }

  .bars {
    display: flex; align-items: flex-end; gap: 2px;
    height: 16px; width: 18px; flex-shrink: 0;
  }
  .bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  .bar:nth-child(2) { animation-delay: 0.15s; }
  .bar:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    from { height: 4px; }
    to { height: 14px; }
  }

  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 0.88rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .track.active .track-name { color: var(--accent); }
  .track-dur {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Equalizer bars on active */
  .eq-anim { display: none; }
  .track.active.playing .eq-anim { display: flex; }
  .track.active.playing .track-num { display: none; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎵 আমার গান</h1>
    <p>৬টি গান · বাজাও আর উপভোগ করো</p>
  </div>

  <!-- Now Playing -->
  <div class="now-playing">
    <div class="vinyl-wrap">
      <div class="vinyl" id="vinyl">
        <div class="vinyl-center"></div>
      </div>
    </div>
    <div class="song-info">
      <div class="song-title" id="songTitle">গান বেছে নাও</div>
      <div class="song-index" id="songIndex">— / ৬</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg" id="progressBg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">০:০০</span>
        <span id="totalTime">০:০০</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" title="আগের গান">⏮</button>
      <button class="play-btn" id="playBtn">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="পরের গান">⏭</button>
    </div>
    <div class="volume-row">
      <span class="volume-icon">🔈</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
      <span class="volume-icon">🔊</span>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-label">প্লেলিস্ট</div>
  <div class="playlist" id="playlist"></div>
</div>

<audio id="audio"></audio>

<script>
  const songs = [
    { title: "Har Har Mohave", file: "Har_har_Mohave_.mp3" },
    { title: "Sad (Part 2)", file: "Sad_2__2___1_.mp3" },
    { title: "Sad 4", file: "Sad_4.mp3" },
    { title: "Sad 4 (Alt)", file: "Sad_4__1_.mp3" },
    { title: "Aloo", file: "Aloo_.mp3" },
    { title: "Item 1", file: "Item_1__1_.mp3" },
  ];

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const vinyl = document.getElementById('vinyl');
  const songTitle = document.getElementById('songTitle');
  const songIndex = document.getElementById('songIndex');
  const progressFill = document.getElementById('progressFill');
  const progressBg = document.getElementById('progressBg');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const volumeInput = document.getElementById('volume');
  const playlistEl = document.getElementById('playlist');

  let currentIdx = 0;
  let isPlaying = false;

  function toBengaliNum(n) {
    const map = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
    return String(n).replace(/[0-9]/g, d => map[+d]);
  }

  function formatTime(s) {
    if (isNaN(s)) return '০:০০';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return toBengaliNum(m) + ':' + (sec < 10 ? '০' : '') + toBengaliNum(sec);
  }

  function buildPlaylist() {
    playlistEl.innerHTML = '';
    songs.forEach((song, i) => {
      const div = document.createElement('div');
      div.className = 'track' + (i === currentIdx ? ' active' : '');
      div.innerHTML = `
        <span class="track-num">${toBengaliNum(i + 1)}</span>
        <div class="bars eq-anim">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="track-info">
          <div class="track-name">${song.title}</div>
          <div class="track-dur" id="dur-${i}">—</div>
        </div>
      `;
      div.addEventListener('click', () => loadSong(i, true));
      playlistEl.appendChild(div);
    });
  }

  function updatePlaylist() {
    document.querySelectorAll('.track').forEach((el, i) => {
      el.className = 'track' + (i === currentIdx ? ' active' : '') + (i === currentIdx && isPlaying ? ' playing' : '');
    });
  }

  function loadSong(idx, autoplay = false) {
    currentIdx = idx;
    const song = songs[idx];
    audio.src = song.file;
    songTitle.textContent = song.title;
    songIndex.textContent = toBengaliNum(idx + 1) + ' / ৬';
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '০:০০';
    totalTimeEl.textContent = '০:০০';
    updatePlaylist();
    if (autoplay) { audio.play(); }
  }

  function togglePlay() {
    if (audio.paused) {
      if (!audio.src) loadSong(0, false);
      audio.play();
    } else {
      audio.pause();
    }
  }

  audio.addEventListener('play', () => {
    isPlaying = true;
    playBtn.textContent = '⏸';
    vinyl.classList.add('spinning');
    updatePlaylist();
  });

  audio.addEventListener('pause', () => {
    isPlaying = false;
    playBtn.textContent = '▶';
    vinyl.classList.remove('spinning');
    updatePlaylist();
  });

  audio.addEventListener('ended', () => {
    if (currentIdx < songs.length - 1) loadSong(currentIdx + 1, true);
    else loadSong(0, false);
  });

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
    totalTimeEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('loadedmetadata', () => {
    const dur = document.getElementById('dur-' + currentIdx);
    if (dur) dur.textContent = formatTime(audio.duration);
    totalTimeEl.textContent = formatTime(audio.duration);
  });

  progressBg.addEventListener('click', e => {
    const rect = progressBg.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = ratio * audio.duration;
  });

  volumeInput.addEventListener('input', () => { audio.volume = volumeInput.value; });
  audio.volume = 0.8;

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', () => {
    loadSong(currentIdx > 0 ? currentIdx - 1 : songs.length - 1, isPlaying);
  });
  nextBtn.addEventListener('click', () => {
    loadSong(currentIdx < songs.length - 1 ? currentIdx + 1 : 0, isPlaying);
  });

  buildPlaylist();
  loadSong(0, false);
</script>
</body>
</html>
