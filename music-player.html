<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-deep:    #0a0a0f;
            --bg-card:    #111118;
            --bg-glass:   rgba(255,255,255,0.04);
            --accent:     #e8c06a;
            --accent-dim: rgba(232,192,106,0.15);
            --accent-glow:rgba(232,192,106,0.35);
            --text-hi:    #f0ead8;
            --text-mid:   #9a9283;
            --text-lo:    #3e3a30;
            --border:     rgba(232,192,106,0.12);
            --track-w:    340px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── ambient orbs ── */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(232,192,106,0.08) 0%, transparent 70%);
            top: -120px; right: -120px;
        }
        body::after {
            width: 360px; height: 360px;
            background: radial-gradient(circle, rgba(100,80,200,0.06) 0%, transparent 70%);
            bottom: -80px; left: -80px;
        }

        /* ── player shell ── */
        .player {
            position: relative;
            z-index: 1;
            width: var(--track-w);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px 28px 24px;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.6),
                0 30px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(30px) scale(0.97); }
            to   { opacity:1; transform:none; }
        }

        /* ── vinyl disc ── */
        .disc-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 24px;
        }
        .disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background:
                repeating-radial-gradient(circle at center,
                    #1a1a22 0px, #0e0e14 4px, #1a1a22 8px),
                radial-gradient(circle at center, #2a2418 0%, #0e0e14 60%);
            box-shadow:
                0 0 0 2px var(--text-lo),
                0 0 30px rgba(0,0,0,0.8),
                0 0 0 40px rgba(0,0,0,0) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
        }
        .disc.playing { animation-play-state: running; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .disc-label {
            position: absolute;
            width: 50px; height: 50px;
            background: radial-gradient(circle, var(--accent) 0%, #c49a2a 100%);
            border-radius: 50%;
            box-shadow: 0 0 16px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .disc-needle {
            position: absolute;
            top: -8px; right: -10px;
            width: 42px; height: 42px;
            transform-origin: 10px 10px;
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .disc-needle svg { width: 100%; height: 100%; }
        .disc-needle.lifted { transform: rotate(-18deg); }
        .disc-needle.down   { transform: rotate(0deg); }

        /* ── track info ── */
        .track-info {
            text-align: center;
            margin-bottom: 22px;
            min-height: 52px;
        }
        .track-title {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: var(--text-hi);
            line-height: 1.3;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: opacity 0.3s;
        }
        .track-sub {
            font-size: 12px;
            color: var(--text-mid);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── waveform / progress ── */
        .progress-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .progress-bar {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--text-lo);
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .progress-bar:hover::-webkit-slider-thumb { transform: scale(1.3); }
        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-mid);
            margin-top: 6px;
        }

        /* ── controls ── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 22px;
        }
        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-mid);
            padding: 8px;
            border-radius: 50%;
            transition: color 0.2s, background 0.2s, transform 0.15s;
            line-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover { color: var(--accent); background: var(--accent-dim); transform: scale(1.1); }
        .btn:active { transform: scale(0.95); }
        .btn svg { display: block; }

        .btn-play {
            width: 58px; height: 58px;
            background: var(--accent);
            color: #0a0a0f;
            box-shadow: 0 0 24px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.4);
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .btn-play:hover {
            background: #f0d080;
            color: #0a0a0f;
            box-shadow: 0 0 36px var(--accent-glow);
            transform: scale(1.06);
        }

        /* ── volume ── */
        .volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .volume-row svg { color: var(--text-mid); flex-shrink: 0; }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 3px;
            background: var(--text-lo);
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--text-mid);
            cursor: pointer;
            transition: background 0.2s;
        }
        .volume-slider:hover::-webkit-slider-thumb { background: var(--accent); }

        /* ── playlist ── */
        .playlist-label {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .playlist-label::after {
            content:''; flex:1;
            height: 1px;
            background: var(--border);
        }

        .playlist {
            max-height: 190px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--text-lo) transparent;
        }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--text-lo); border-radius: 4px; }

        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }
        .song-item::before {
            content:'';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .song-item:hover::before { opacity: 1; }
        .song-item:hover { transform: translateX(3px); }

        .song-num {
            font-size: 11px;
            color: var(--text-lo);
            min-width: 16px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.2s;
            position: relative;
        }
        .song-emoji {
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }
        .song-name {
            font-size: 13px;
            color: var(--text-mid);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
            transition: color 0.2s;
        }
        .song-item:hover .song-name { color: var(--text-hi); }

        .song-item.active .song-name { color: var(--accent); font-weight: 500; }
        .song-item.active::before { opacity: 1; }
        .song-item.active .song-num { opacity: 0; }

        .bars {
            display: none;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            position: absolute;
            left: 12px;
        }
        .song-item.active .bars { display: flex; }
        .bars span {
            display: block;
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: barPulse 0.8s ease-in-out infinite alternate;
        }
        .bars span:nth-child(2) { animation-delay: 0.15s; }
        .bars span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes barPulse {
            from { height: 4px; }
            to   { height: 14px; }
        }

        audio { display: none; }
    </style>
</head>
<body>

<div class="player">

    <!-- vinyl -->
    <div class="disc-wrap">
        <div class="disc" id="disc">
            <div class="disc-label">🎵</div>
        </div>
        <div class="disc-needle lifted" id="needle">
            <svg viewBox="0 0 42 42" fill="none">
                <circle cx="10" cy="10" r="7" fill="#2a2a36" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
                <line x1="10" y1="10" x2="34" y2="36" stroke="var(--text-mid)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="34" cy="36" r="2.5" fill="var(--accent)"/>
            </svg>
        </div>
    </div>

    <!-- info -->
    <div class="track-info">
        <div class="track-title" id="track-title">একটি গান সিলেক্ট করুন</div>
        <div class="track-sub" id="track-sub">— select a track —</div>
    </div>

    <!-- progress -->
    <div class="progress-wrap">
        <input type="range" class="progress-bar" id="progress" value="0" min="0" max="100" step="0.1">
        <div class="time-labels">
            <span id="cur-time">0:00</span>
            <span id="dur-time">0:00</span>
        </div>
    </div>

    <!-- controls -->
    <div class="controls">
        <!-- prev -->
        <button class="btn" id="btn-prev" title="Previous">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
        </button>

        <!-- play/pause -->
        <button class="btn btn-play" id="btn-play" title="Play / Pause">
            <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
            </svg>
        </button>

        <!-- next -->
        <button class="btn" id="btn-next" title="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
            </svg>
        </button>
    </div>

    <!-- volume -->
    <div class="volume-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" class="volume-slider" id="volume" value="80" min="0" max="100">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </div>

    <!-- playlist -->
    <div class="playlist-label">Playlist</div>
    <div class="playlist" id="playlist"></div>
</div>

<audio id="main-audio"></audio>

<script>
    const songs = [
        { file: 'Game background music.mp3',  emoji: '🎮', name: 'Game Background Music' },
        { file: 'Frozy run music.mp3',         emoji: '🏃', name: 'Frozy Run Music' },
        { file: 'Har har Mohave  (1).mp3',     emoji: '🕉️', name: 'Har Har Mahadev' },
        { file: 'Sahiba Lyrics - Aditya Rikhari • saahiba, aaye ghar kaahe na.mp3', emoji: '🎸', name: 'Sahiba — Aditya Rikhari' },
        { file: 'মা মেনোকা.mp3',               emoji: '🙏', name: 'মা মেনোকা' },
    ];

    const audio     = document.getElementById('main-audio');
    const disc      = document.getElementById('disc');
    const needle    = document.getElementById('needle');
    const titleEl   = document.getElementById('track-title');
    const subEl     = document.getElementById('track-sub');
    const progress  = document.getElementById('progress');
    const curTime   = document.getElementById('cur-time');
    const durTime   = document.getElementById('dur-time');
    const volumeEl  = document.getElementById('volume');
    const btnPlay   = document.getElementById('btn-play');
    const iconPlay  = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const playlist  = document.getElementById('playlist');

    let currentIdx = -1;

    /* ── build playlist ── */
    songs.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'song-item';
        el.innerHTML = `
            <span class="song-num">${i+1}</span>
            <div class="bars"><span></span><span></span><span></span></div>
            <span class="song-emoji">${s.emoji}</span>
            <span class="song-name">${s.name}</span>
        `;
        el.addEventListener('click', () => playSong(i));
        playlist.appendChild(el);
    });

    function fmt(s) {
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60).toString().padStart(2,'0');
        return `${m}:${sec}`;
    }

    function playSong(idx) {
        currentIdx = idx;
        const s = songs[idx];
        audio.src = s.file;
        audio.volume = volumeEl.value / 100;
        audio.play();
        titleEl.textContent = s.name;
        subEl.textContent   = s.emoji + ' Now Playing';
        disc.classList.add('playing');
        needle.classList.remove('lifted');
        needle.classList.add('down');
        iconPlay.style.display  = 'none';
        iconPause.style.display = 'block';
        document.querySelectorAll('.song-item').forEach((el,i) =>
            el.classList.toggle('active', i === idx));
    }

    function togglePlay() {
        if (currentIdx < 0) { playSong(0); return; }
        if (audio.paused) {
            audio.play();
            disc.classList.add('playing');
            needle.classList.replace('lifted','down');
            iconPlay.style.display  = 'none';
            iconPause.style.display = 'block';
        } else {
            audio.pause();
            disc.classList.remove('playing');
            needle.classList.replace('down','lifted');
            iconPlay.style.display  = 'block';
            iconPause.style.display = 'none';
        }
    }

    btnPlay.addEventListener('click', togglePlay);

    document.getElementById('btn-prev').addEventListener('click', () => {
        const idx = currentIdx <= 0 ? songs.length-1 : currentIdx-1;
        playSong(idx);
    });
    document.getElementById('btn-next').addEventListener('click', () => {
        playSong((currentIdx+1) % songs.length);
    });

    audio.addEventListener('ended', () => {
        playSong((currentIdx+1) % songs.length);
    });

    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        progress.value = (audio.currentTime / audio.duration) * 100;
        curTime.textContent = fmt(audio.currentTime);
        durTime.textContent = fmt(audio.duration);
        // dynamic progress fill
        progress.style.background =
            `linear-gradient(to right, var(--accent) ${progress.value}%, var(--text-lo) ${progress.value}%)`;
    });

    progress.addEventListener('input', () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
        progress.style.background =
            `linear-gradient(to right, var(--accent) ${progress.value}%, var(--text-lo) ${progress.value}%)`;
    });

    volumeEl.addEventListener('input', () => {
        audio.volume = volumeEl.value / 100;
    });

    audio.addEventListener('pause', () => {
        disc.classList.remove('playing');
        needle.classList.replace('down','lifted');
        iconPlay.style.display  = 'block';
        iconPause.style.display = 'none';
    });
    audio.addEventListener('play', () => {
        disc.classList.add('playing');
        needle.classList.replace('lifted','down');
        iconPlay.style.display  = 'none';
        iconPause.style.display = 'block';
    });
</script>
</body>
</html>
